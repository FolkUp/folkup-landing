<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Free encyclopedias about places, sports, nature, and culture. No ads, no paywalls. Made by people who care." />
  <link rel="icon" href="/favicon.ico" sizes="32x32" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

  <!-- OG -->
  <meta property="og:title" content="FolkUp — Free encyclopedias, made by people who care" />
  <meta property="og:description" content="Free encyclopedias about places, sports, nature, and culture. No ads, no paywalls." />
  <meta property="og:image" content="https://folkup.app/images/og-image.png?v=2" />
  <meta property="og:url" content="https://folkup.app/" />
  <meta property="og:type" content="website" />
  <meta property="og:locale" content="en" />
  <meta property="og:locale:alternate" content="ru" />
  <meta property="og:locale:alternate" content="pt" />

  <!-- Twitter -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="FolkUp — Free encyclopedias, made by people who care" />
  <meta name="twitter:description" content="Free encyclopedias. No ads, no paywalls." />
  <meta name="twitter:image" content="https://folkup.app/images/og-image.png?v=2" />

  <!--
    canonical + hreflang are now injected per-route by useHead in src/App.vue
    (LAND-008 B4). The static placeholders previously here pointed all langs to
    `https://folkup.app/`, which produced duplicate/stale entries after the
    head plugin ran. Single source of truth = App.vue.
  -->

  <!-- Preload critical fonts (Cinzel headings, EB Garamond body, Pacifico brand mark) -->
  <link rel="preload" href="/fonts/pacifico-latin.woff2" as="font" type="font/woff2" crossorigin />
  <link rel="preload" href="/fonts/cinzel-regular-latin.woff2" as="font" type="font/woff2" crossorigin />
  <link rel="preload" href="/fonts/ebgaramond-regular-latin.woff2" as="font" type="font/woff2" crossorigin />

  <title>FolkUp — Free encyclopedias, made by people who care</title>
</head>
<body>
  <div id="app"></div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
